<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>MusicYM Control</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      width: 340px;
      font: 14px/1.4 system-ui, sans-serif;
      color: #111827;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .row > * {
      flex: 1;
    }

    input, button {
      box-sizing: border-box;
      width: 100%;
      min-height: 36px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 0 10px;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: #fff;
      border: 0;
    }

    button.secondary {
      background: #374151;
    }

    #qrImage {
      width: 100%;
      max-width: 240px;
      display: block;
      margin: 8px auto 0;
    }

    .muted {
      color: #6b7280;
      font-size: 12px;
    }

    code {
      word-break: break-all;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>MusicYM Control</h1>

  <section class="card">
    <div><strong>Локальный сервер</strong></div>
    <div class="row">
      <input id="serverOrigin" type="text" placeholder="HTTP origin" />
    </div>
    <div class="row">
      <button id="saveServer" class="secondary">Сохранить</button>
      <button id="createSession">Создать QR</button>
    </div>
    <div class="muted" id="serverHealth">Проверка сервера…</div>
  </section>

  <section class="card">
    <div><strong>Состояние</strong></div>
    <div id="wsStatus">WS: —</div>
    <div id="pairStatus">Pairing: —</div>
    <div id="trackTitle">Трек: —</div>
    <div class="muted" id="playerTabStatus">Проверка вкладки Яндекс Музыки…</div>
    <div class="row">
      <button id="fixPlayerTab" class="secondary" data-action="open">Открыть Яндекс Музыку</button>
    </div>
  </section>

  <section class="card">
    <div><strong>Быстрое управление</strong></div>
    <div class="row">
      <button id="prevBtn" class="secondary">⏮</button>
      <button id="toggleBtn">⏯</button>
      <button id="nextBtn" class="secondary">⏭</button>
    </div>
  </section>

  <section class="card">
    <div><strong>QR pairing</strong></div>
    <div>Pair code: <code id="pairCode">—</code></div>
    <div class="muted">Remote URL:</div>
    <code id="remoteUrl">—</code>
    <img id="qrImage" alt="QR code" hidden />
  </section>

  <section class="card">
    <a href="#" id="openControl">Открыть расширенную панель</a>
  </section>

  <script src="popup.js"></script>
</body>
</html>
